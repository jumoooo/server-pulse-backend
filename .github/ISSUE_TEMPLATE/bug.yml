name: "🐞 Bug"
description: "backend 버그 수정 이슈"
title: "[bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: 증상
      description: 어떤 문제가 발생했는지 적어주세요.
      placeholder: 특정 엔드포인트가 500을 반환해요.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: 재현 방법
      description: 재현 순서를 적어주세요.
      placeholder: 1. GET /api/servers/overview 호출 2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대 결과
      description: 원래 어떻게 동작해야 하는지 적어주세요.
      placeholder: 정상 응답과 상태 코드가 반환돼야 해요.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: 영향 범위
      description: frontend 계약, env, `/health` 영향이 있으면 적어주세요.
      placeholder: frontend 응답 소비 영향 없음 / root parent issue 필요 없음
